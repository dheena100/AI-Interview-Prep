

{% extends 'base.html' %}

{% block content %}
<style>
    /* Premium Theme Variables & Background */
    .premium-bg {
        background-color: #0b0f19;
        /* Rich, modern dark slate instead of flat black */
        position: relative;
        min-height: 100vh;
    }

    /* Glowing ambient shapes in the background for professional depth */
    .bg-glow-1,
    .bg-glow-2 {
        position: absolute;
        border-radius: 50%;
        filter: blur(120px);
        z-index: 0;
        opacity: 0.12;
    }

    .bg-glow-1 {
        top: 15%;
        left: 20%;
        width: 300px;
        height: 300px;
        background: #6366f1;
    }

    .bg-glow-2 {
        bottom: 15%;
        right: 20%;
        width: 350px;
        height: 350px;
        background: #06b6d4;
    }

    .premium-content-container {
        position: relative;
        z-index: 1;
    }

    /* Modern Glassmorphic Card Setup */
    .glass-card {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(16px) saturate(120%);
        -webkit-backdrop-filter: blur(16px) saturate(120%);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 24px;
        /* Smoother premium corners */
        transition: border-color 0.3s ease;
    }

    .glass-card:hover {
        border-color: rgba(255, 255, 255, 0.12);
    }

    /* Modern Gradient Logo Icon */
    .brand-logo i {
        font-size: 2.75rem;
        background: linear-gradient(135deg, #a855f7 0%, #6366f1 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        display: inline-block;
    }

    /* Form Floating Component Upgrades */
    .form-floating>.custom-input {
        background-color: rgba(255, 255, 255, 0.02) !important;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 14px;
        color: #ffffff !important;
        transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .form-floating>.custom-input:focus {
        background-color: rgba(255, 255, 255, 0.05) !important;
        border-color: #6366f1;
        box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
    }

    /* Autofill fix for dark backgrounds */
    .form-floating>.custom-input:-webkit-autofill,
    .form-floating>.custom-input:-webkit-autofill:hover,
    .form-floating>.custom-input:-webkit-autofill:focus {
        -webkit-text-fill-color: #ffffff !important;
        -webkit-box-shadow: 0 0 0px 1000px #131926 inset !important;
        transition: background-color 5000s ease-in-out 0s;
    }

    .form-floating>label {
        padding-left: 1.25rem;
        color: rgba(255, 255, 255, 0.4) !important;
    }

    .form-floating>.custom-input:focus~label,
    .form-floating>.custom-input:not(:placeholder-shown)~label {
        color: #818cf8 !important;
    }

    /* Text Links Styling */
    .text-premium {
        color: #818cf8;
        text-decoration: none;
        transition: color 0.2s ease;
    }

    .text-premium:hover {
        color: #a5b4fc;
    }

    .link-underline-hover:hover {
        text-decoration: underline;
    }

    /* Custom Checkbox Design */
    .custom-checkbox {
        background-color: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.2);
        cursor: pointer;
    }

    .custom-checkbox:checked {
        background-color: #6366f1;
        border-color: #6366f1;
    }

    .custom-checkbox:focus {
        box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
        border-color: rgba(255, 255, 255, 0.3);
    }

    /* Premium Tactile Submit Button */
    .btn-premium {
        background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
        border: none;
        border-radius: 14px;
        color: #ffffff;
        font-size: 1rem;
        letter-spacing: 0.3px;
        transition: all 0.25s ease;
    }

    .btn-premium:hover {
        background: linear-gradient(135deg, #4f46e5 0%, #4338ca 100%);
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(79, 70, 229, 0.35) !important;
        color: #ffffff;
    }

    .btn-premium:active {
        transform: translateY(0);
    }

    /* Subdued Divider */
    .premium-divider {
        border-color: rgba(255, 255, 255, 0.08) !important;
    }
</style>

<section class="vh-100 d-flex align-items-center position-relative overflow-hidden premium-bg">
    <div class="bg-glow-1"></div>
    <div class="bg-glow-2"></div>

    <div class="container premium-content-container">
        <div class="row justify-content-center">
            <div class="col-xl-4 col-lg-5 col-md-7 col-sm-9">

                <div class="glass-card shadow-lg p-4 p-sm-5" data-aos="zoom-in" data-aos-duration="750">

                    <div class="text-center mb-4">
                        <div class="brand-logo mb-3">
                            <i class="bi bi-cpu-fill"></i>
                        </div>
                        <h2 class="fw-bold text-white tracking-tight mb-2">Welcome Back</h2>
                        <p class="text-muted small">
                            Login to continue your AI interview journey
                        </p>
                    </div>

                    <form method="POST" autocomplete="off">
                        <div class="form-floating mb-3">
                            <input type="email" name="email" id="floatingEmail" class="form-control custom-input"
                                placeholder="name@example.com" required>
                            <label for="floatingEmail">
                                <i class="bi bi-envelope me-2"></i>Email Address
                            </label>
                        </div>

                        <div class="form-floating mb-3">
                            <input type="password" name="password" id="floatingPassword"
                                class="form-control custom-input" placeholder="Password" required>
                            <label for="floatingPassword">
                                <i class="bi bi-lock me-2"></i>Password
                            </label>
                        </div>

                        <div class="d-flex justify-content-between align-items-center mb-4 small">
                            <div class="form-check">
                                <input class="form-check-input custom-checkbox" type="checkbox" id="rememberMe">
                                <label class="form-check-label text-muted user-select-none" for="rememberMe">
                                    Remember me
                                </label>
                            </div>
                            <a href="/forgot-password" class="text-premium link-underline-hover fw-medium">Forgot
                                Password?</a>
                        </div>

                        <button type="submit" class="btn btn-premium w-100 py-3 fw-semibold shadow-sm">
                            Sign In <i class="bi bi-arrow-right ms-2"></i>
                        </button>
                    </form>

                    <div class="text-center mt-4 pt-3 border-top premium-divider">
                        <p class="text-muted small mb-0">
                            Don't have an account?
                            <a href="/register" class="text-premium fw-semibold link-underline-hover ms-1">Register
                                Now</a>
                        </p>
                    </div>

                </div>

            </div>
        </div>
    </div>
</section>
{% endblock %}
